approval_policy = "on-request"
approvals_reviewer = "user"
default_permissions = "riel-workspace"
project_doc_max_bytes = 65536
project_doc_fallback_filenames = ["CHATGPT_PROJECT_INSTRUCTIONS.md"]

[features]
hooks = true
# Compatibilidad con Codex CLI 0.118.x, donde el flag aún conserva
# su nombre experimental. Las versiones actuales usan `hooks`.
codex_hooks = true

[agents]
max_threads = 4
max_depth = 1
interrupt_message = true

[permissions.riel-workspace]
description = "Checkout del kernel en solo lectura; contexto y visibilidad viven en fuentes compartidas."
extends = ":workspace"

[permissions.riel-workspace.filesystem.":workspace_roots"]
"AGENTS.md" = "read"
"README.md" = "read"
"LEEME.md" = "read"
"CHANGELOG.md" = "read"
"LICENSE" = "read"
"NOTICE" = "read"
"SECURITY.md" = "read"
"CONTRIBUTING.md" = "read"
"kernel/**" = "read"
"templates/**" = "read"
"scripts/**" = "read"
"tests/**" = "read"
"chatgpt/**" = "read"
".github/**" = "read"
".codex/config.toml" = "read"
".codex/hooks.json" = "read"
".codex/hooks/**" = "read"
".codex/rules/**" = "read"
".codex/agents/riel-*.toml" = "read"
".agents/skills/**" = "read"
".riel-instance.json" = "read"
"org/**" = "deny"
"engagements/**" = "deny"
"clients/**" = "deny"
"projects/**" = "deny"
"casos/**" = "deny"
"bus/**" = "deny"
"bandeja/**" = "deny"
".riel/**" = "deny"
".codex/agents/local-*.toml" = "deny"
".env" = "deny"
".env.*" = "deny"
"**/.env" = "deny"
"**/.env.*" = "deny"
"**/*credentials*" = "deny"
"**/*secret*" = "deny"

[permissions.riel-workspace.network]
enabled = false
